<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="homepage.css">
</head>
<body>
<main class="container">
<header class="topbar">
<span id="userIndicator">Signed in as -</span>
<button id="logoutButton" type="button">Logout</button>
</header>
<h1>Upload Image</h1>
<p class="hint">Select one image and send it with a simple POST request.</p>

<form id="uploadForm" class="upload-form">
<input id="imageInput" type="file" accept="image/*" required>
<button id="uploadButton" type="submit">Continue</button>
</form>

<div id="status" class="status" aria-live="polite"></div>
</main>

<script src="homepage.js"></script>
</body>
</html>
