<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Upload Studio</title>
	<link rel="stylesheet" href="homepage.css">
</head>
<body>
	<div class="math-background" id="mathBackground" aria-hidden="true"></div>
	<button class="theme-toggle" id="themeToggle" type="button" aria-label="Switch to light theme">🌙</button>
	<main class="page">
		<section class="hero" aria-label="Image upload area">
			<h1>AI GRAPH QUESTION SOLVER</h1>
			<p class="subtitle">
				Drag and drop graph-related math question image, or click to browse your files.
			</p>

			<div class="upload-card" id="dropZone">
				<div class="preview-wrap" id="previewWrap">
					<img id="previewImage" alt="Uploaded preview" />
					<div class="preview-placeholder" id="previewPlaceholder">
						<span class="placeholder-icon">+</span>
						<button class="drop-prompt-button" type="button">Drop an image here</button>
						<small>PNG, JPG, WEBP</small>
					</div>
				</div>
				<button class="upload-button" id="uploadButton" type="button" disabled>Upload the image</button>
				<input id="imageUpload" type="file" accept="image/*" multiple>
			</div>
			<div class="manual-solve" style="margin-top:1.2rem;">
				<label for="manualEquation">Enter equation manually when AI fails:</label>
				<input id="manualEquation" type="text" placeholder="e.g., y = 4x - 1" style="width:65%;padding:0.5rem;margin-top:0.3rem;" />
				<button id="manualSolveButton" type="button" style="padding:0.5rem 0.8rem;">Solve manually</button>
			</div>
			<div class="solution-card" id="solutionCard" aria-live="polite" style="margin-top: 1rem;"></div>
		</section>
	</main>

	<script src="homepage.js"></script>
</body>
</html>
