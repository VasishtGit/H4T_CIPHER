<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Explanation</title>
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
	<link rel="stylesheet" href="explain.css">
</head>
<body>
	<main class="container">
		<section class="card auth-card">
			<div class="auth-row">
				<span id="userIndicator">Signed in as -</span>
				<button id="logoutButton" class="logout-button" type="button">Logout</button>
			</div>
		</section>

		<section class="card question-card">
			<p class="label">Current Question</p>
			<h1 id="activeQuestion">Uploaded question</h1>
		</section>

		<section class="top-grid">
			<article class="card">
				<h2>Uploaded Question Image</h2>
				<div class="image-wrap">
					<img id="uploadedQuestionImage" class="uploaded-question-image" src="" alt="Uploaded question image">
					<p id="uploadedImageCaption">No uploaded image found.</p>
				</div>
			</article>

			<article class="card">
				<h2>Detailed Explanation</h2>
				<div id="explanationLoader" class="explanation-loader" hidden>
					<div class="explanation-loader-meta">
						<span id="explanationLoaderLabel">Analyzing image...</span>
						<span id="explanationLoaderTime">01:30</span>
					</div>
					<div class="explanation-loader-track">
						<div id="explanationLoaderBar" class="explanation-loader-bar"></div>
					</div>
				</div>
				<div class="explain-content" id="explainContent">
					<p>Waiting for explanation...</p>
				</div>
			</article>
		</section>

		<!--
		<section class="card">
			<h2>Generated Explanation Video</h2>
			<button id="generateVideoButton" class="generate-video-button" type="button" disabled>
				Generate Video Explanation
			</button>
			<div id="videoLoader" class="explanation-loader" hidden>
				<div class="explanation-loader-meta">
					<span id="videoLoaderLabel">Generating video...</span>
					<span id="videoLoaderTime">02:00</span>
				</div>
				<div class="explanation-loader-track">
					<div id="videoLoaderBar" class="explanation-loader-bar"></div>
				</div>
			</div>
			<div class="video-frame">
				<video id="resultVideo" controls preload="metadata" width="100%">
					<source id="resultVideoSource" src="" type="video/mp4">
				</video>
			</div>
			<p id="videoStatus" class="video-status">Waiting for generated video...</p>
		</section>
		-->
	</main>

	<script src="explain.js"></script>
</body>
</html>
